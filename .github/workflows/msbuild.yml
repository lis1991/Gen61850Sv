# separate terms of service, privacy policy, and support
# documentation.

name: Build Gen61850Sv

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  # Принудительно использует Node 24 для экшенов, убирая варнинг о Node 20
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Path to the solution file relative to the root of the project.
  SOLUTION_FILE_PATH: .

  # Configuration type to build.
  # You can convert this to a build matrix if you need coverage of multiple configuration types.
  # https://docs.github.com/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
  BUILD_CONFIGURATION: Release

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Обновлено до v2 для устранения ошибки set-output deprecated
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # Установка Qt 5.12.12 (согласно README проекта)
    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.12.12'
        arch: 'win64_msvc2017_64' # Тулчейн v141 соответствует VS2017
        cache: true

    - name: Restore NuGet packages
      run: nuget restore ${{env.SOLUTION_FILE_PATH}}

    # Сборка через qmake/nmake вместо msbuild (требует наличия .pro файла)
    - name: Build with qmake
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\18\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        qmake GenSV.pro -spec win32-msvc "CONFIG+=release"
        nmake release
