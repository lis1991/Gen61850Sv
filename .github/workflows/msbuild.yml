name: Build and Release Gen61850Sv

on:
  push:
    branches: [ "master" ]
    tags:
      - 'v*' # Триггер для создания релиза при пуше тега (например, v1.0)
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for release (e.g. v1.0.0). Leave empty to skip release.'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SOLUTION_FILE_PATH: .
  BUILD_CONFIGURATION: Release

permissions:
  contents: write # Нужно для создания релиза

jobs:
  build:
    runs-on: windows-2025

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
      with:
        msbuild-architecture: x64

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.12.12'
        arch: 'win64_msvc2017_64'
        cache: true
        cache-key-prefix: 'qt-5.12.12-msvc2017-x64'

    - name: Download and setup QtMsBuild
      shell: pwsh
      run: |
        $url = "https://download.qt.io/official_releases/vsaddin/3.3.1/qt-vsaddin-msbuild-3.3.1.zip"
        $zipPath = "${{ runner.temp }}\qtmsbuild.zip"
        $extractPath = "${{ runner.temp }}\qtmsbuild_extracted"

        Invoke-WebRequest -Uri $url -OutFile $zipPath
        Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force

        $qtMsBuildSource = Get-ChildItem -Path $extractPath -Recurse -Directory -Filter "QtMsBuild" | Select-Object -First 1
        if ($qtMsBuildSource) {
            Copy-Item -Path $qtMsBuildSource.FullName -Destination ".\QtMsBuild" -Recurse -Force
        } else {
            New-Item -ItemType Directory -Path ".\QtMsBuild" -Force | Out-Null
            Copy-Item -Path "$extractPath\*" -Destination ".\QtMsBuild" -Recurse -Force
        }

        $absPath = (Resolve-Path ".\QtMsBuild").Path
        echo "QTMSBUILD_DIR=$absPath" >> $env:GITHUB_ENV
        Write-Host "QtMsBuild path: $absPath"

    - name: Restore NuGet packages
      run: nuget restore ${{env.SOLUTION_FILE_PATH}}

    - name: Build qwt (x64 Release) — required by GenSV.vcxproj
      shell: pwsh
      run: |
        msbuild qwt\qwt.sln `
          /p:Configuration=Release `
          /p:Platform=x64 `
          /p:WindowsTargetPlatformVersion=10.0 `
          /p:PlatformToolset=v143 `
          /p:QtInstall="${{ env.Qt5_Dir }}" `
          /p:QtDir="${{ env.Qt5_Dir }}" `
          "/p:QtMsBuild=${{ env.QTMSBUILD_DIR }}" `
          /m

    - name: Verify qwt.lib exists
      shell: pwsh
      run: |
        $lib = "qwt\x64\Release\qwt.lib"
        if (-not (Test-Path $lib)) {
          Write-Error "qwt.lib not found at $lib"
          Write-Host "All .lib files found under qwt\ :"
          Get-ChildItem -Path "qwt" -Recurse -Filter "*.lib" | Select-Object FullName
          exit 1
        }
        Write-Host "OK: $lib"

    - name: Build solution
      shell: pwsh
      run: |
        msbuild ${{env.SOLUTION_FILE_PATH}} `
          /p:Configuration=${{env.BUILD_CONFIGURATION}} `
          /p:Platform=x64 `
          /p:WindowsTargetPlatformVersion=10.0 `
          /p:PlatformToolset=v143 `
          /p:QtInstall="${{ env.Qt5_Dir }}" `
          /p:QtDir="${{ env.Qt5_Dir }}" `
          "/p:QtMsBuild=${{ env.QTMSBUILD_DIR }}" `
          /p:DefineConstants="_SILENCE_ALL_MS_EXT_DEPRECATION_WARNINGS" `
          /m

    # Определяем имя тега: из push-тега или из ручного ввода
    - name: Resolve tag name
      id: resolve_tag
      shell: pwsh
      run: |
        if ("${{ github.ref }}" -like "refs/tags/*") {
          $tag = "${{ github.ref_name }}"
        } elseif ("${{ github.event.inputs.tag_name }}" -ne "") {
          $tag = "${{ github.event.inputs.tag_name }}"
        } else {
          $tag = ""
        }
        echo "tag=$tag" >> $env:GITHUB_OUTPUT
        Write-Host "Resolved tag: $tag"

    - name: Archive binaries
      if: steps.resolve_tag.outputs.tag != ''
      shell: pwsh
      run: |
        $releaseDir = ".\x64\Release"
        if (Test-Path $releaseDir) {
            Compress-Archive -Path "$releaseDir\*" -DestinationPath "Gen61850Sv-${{ steps.resolve_tag.outputs.tag }}.zip"
        } else {
            Write-Error "Release directory not found at $releaseDir"
            exit 1
        }

    - name: Create GitHub Release
      if: steps.resolve_tag.outputs.tag != ''
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.resolve_tag.outputs.tag }}
        files: Gen61850Sv-${{ steps.resolve_tag.outputs.tag }}.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
